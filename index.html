<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      const img = new Image();
      img.onload = function () {
        const size = 64;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        // Centraliza a parte do pitbull (centro da imagem widescreen)
        const srcSize = Math.min(img.naturalHeight, img.naturalHeight);
        const offsetX = (img.naturalWidth - srcSize) / 2;
        ctx.drawImage(img, offsetX, 0, srcSize, srcSize, 0, 0, size, size);
        const link = document.querySelector("link[rel='icon']");
        link.href = canvas.toDataURL('image/png');
      };
      img.src = '/icon.png';
    })();
  </script>

  <link rel="icon" type="image/png" href="/icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Pitbull Apostas — Comunidade Premium de Análises Esportivas. Sinais diários, análises estratégicas e acesso exclusivo." />
  <title>Pitbull Apostas — Comunidade Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

    rel="stylesheet" />
